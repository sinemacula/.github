# ==============================================================================
# COMPOSITE ACTION: Setup PHP
# ==============================================================================
name: Setup PHP
description: Install PHP with pcov coverage, configure dependency caching, and install Composer packages

inputs:
    php-version:
        description: PHP version to install
        required: false
        default: '8.3'
    extensions:
        description: PHP extensions to install (comma-separated)
        required: false
        default: ''
    composer-token:
        description: GitHub OAuth token for Composer (optional, for private packages)
        required: false

runs:
    using: composite
    steps:
        -   name: Setup PHP
            uses: shivammathur/setup-php@v2
            with:
                php-version: ${{ inputs.php-version }}
                extensions: ${{ inputs.extensions }}
                coverage: pcov
                tools: composer

        -   name: Cache dependencies
            uses: actions/cache@v5
            with:
                path: |
                    ~/.composer/cache
                    vendor
                key: deps-${{ runner.os }}-php${{ inputs.php-version }}-${{ hashFiles('**/composer.lock') }}
                restore-keys: deps-${{ runner.os }}-php${{ inputs.php-version }}-

        -   name: Install Composer dependencies
            shell: bash
            run: |
                if [ -n "${{ inputs.composer-token }}" ]; then
                    export COMPOSER_AUTH='{"github-oauth": {"github.com": "${{ inputs.composer-token }}"}}'
                fi
                composer install --prefer-dist --no-interaction --no-progress
